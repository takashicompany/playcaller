name: Bump version and publish to PyPI

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  bump-and-publish:
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, '[skip bump]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Bump patch version
        run: |
          # package.json からバージョン取得
          CURRENT=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "Current version: $CURRENT"

          # パッチバージョンを+1
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "New version: $NEW_VERSION"

          # package.json 更新
          python3 -c "
          import json
          with open('package.json', 'r') as f:
              data = json.load(f)
          data['version'] = '$NEW_VERSION'
          with open('package.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          # pyproject.toml 更新
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Server~/pyproject.toml

          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json "Server~/pyproject.toml"
          git commit -m "バージョンを${NEW_VERSION}に更新 [skip ci]"
          git push origin master

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build and publish to PyPI
        run: |
          cd Server~
          uv build
          uv publish --token "$PYPI_TOKEN"
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
